name: Update VIINA data

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild events and derived data
        run: |
          node scripts/build-events.mjs 2026
          node scripts/build-timeline-summary.mjs
          node scripts/build-choropleth-timeline.mjs
          node scripts/build-type-timeline.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "update viina data"
          git push
