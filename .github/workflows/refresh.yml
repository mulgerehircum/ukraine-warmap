name: Refresh VIINA events

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC (VIINA publishes nightly)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download current year events
        run: node scripts/build-events.mjs $(date +%Y)

      - name: Rebuild derived data
        run: |
          node scripts/build-timeline-summary.mjs
          node scripts/build-choropleth-timeline.mjs
          node scripts/build-type-timeline.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet && exit 0
          git commit -m "data: refresh viina $(date +%Y-%m-%d)"
          git pull --rebase && git push
