name: Refresh VIINA events

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:events 2026

      - run: npm run build:timeline

      - run: npm run build:choropleth-timeline

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh viina events'
          file_pattern: 'public/data/viina-events-*.json public/data/timeline-summary.json public/data/choropleth-timeline.json'
